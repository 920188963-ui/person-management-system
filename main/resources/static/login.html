<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>企业员工管理系统--登录--</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: cadetblue;
            height: 100vh;
            font-family: "Microsoft YaHei",Arial,sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box{
            width: 360px;
            padding: 40px 40px;
            background-color: rgba(255,255,255,0.75);
            border-radius: 10px;
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
        }
        .login-box h2{
            text-align: center;
            margin-bottom: 30px;
            color: #000 !important;
            font-size:24px;
            font-weight: 700;
        }
        .input-group{
            margin-bottom: 18px;
        }
        .input-group input{
            width: 100%;
            height: 40px;
            padding: 0 15px;
            border: 1px solid white;
            border-radius: 4px;
            font-size:15px;
            outline: none;
        }
        .input-group input:focus{
            border-color: #1e88e5;
        }
        .btn{
            width: 100%;
            height: 40px;
            border-radius: 30px;
            border: none;
            font-size: 20px ;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn{
            color: white;
            background-color: #1e88e5;
        }
        .login-btn:hover{
            background-color: #1565c0;
        }
        .register-btn{
            background-color: white;
            color: #333;
        }
        .register-btn:hover{
            background-color: white;
        }
        .msg{
            margin-top: 15px;
            text-align: center;
            font-size: 18px;
            color: red;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>企业员工管理系统</h2>
    <div class="input-group">
        <input type="text" id="username" placeholder="请输入用户名" value="admin">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="请输入密码">
    </div>
    <button class="btn login-btn" onclick="doLogin()">登录</button>
    <button class="btn register-btn" onclick="goRegister()">去注册</button>
    <div class="msg" id="msg"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        function doLogin() {
            const username = $("#username").val().trim();
            const password = $("#password").val().trim();

            if (username === "") {
                showMessage("用户名不能为空", "red");
                return;
            }

            if (password === "") {
                showMessage("密码不能为空", "red");
                return;
            }

            $.post("/api/login", {
                username: username,
                password: password
            }, function (res) {
                if (res.success) {
                    showMessage(res.msg || "登录成功", "green");
                    setTimeout(function () {
                        location.href = "index.html";
                    }, 800);
                } else {
                    showMessage(res.msg || "登录失败", "red");
                }
            }).fail(function () {
                showMessage("请求失败，请检查后端接口是否启动", "red");
            });
        }

        function goRegister() {
            window.location.href = "register.html";
        }

        function showMessage(text, color) {
            $("#msg").css("color", color).text(text);
        }

        document.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                doLogin();
            }
        });
    </script>
</div>
</body>
</html>
